<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Mariel Sobiono</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary: #008EE5;
            --primary-glow: rgba(0, 142, 229, 0.4);
            --bg-deep: #010811;
            --bg-card: #083951;
            --glass: rgba(8, 57, 124, 0.2);
            --text-main: #ffffff;
            --text-dim: #CADDEC;
            --border: rgba(0, 142, 229, 0.2);
            --ease: cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Matches index and creative max-width exactly */
        .container { 
            max-width: 1100px; 
            margin: 0 auto; 
            padding: 0 25px; 
            width: 100%;
        }

        /* --- STYLES COPIED DIRECTLY FROM INDEX.HTML NAVIGATION --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(1, 8, 17, 0.8);
            backdrop-filter: blur(10px);
        }

        .logo { font-weight: 800; font-size: 1.5rem; color: var(--text-main); text-decoration: none; }
        .logo span { color: var(--primary); }

        .nav-links { display: flex; gap: 30px; list-style: none; }
        .nav-links a {
            text-decoration: none;
            color: var(--text-dim);
            font-size: 0.9rem;
            font-weight: 500;
            transition: 0.3s;
        }
        .nav-links a:hover { color: var(--primary); }

        /* --- CONTACT HUBS MAIN BODY --- */
        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 0;
        }

        .contact-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 50px 40px;
            width: 100%;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            position: relative;
        }

        .contact-card::before {
            content: 'CONNECT CORE';
            position: absolute; top: 20px; left: 0; right: 0;
            font-size: 0.65rem; letter-spacing: 4px; opacity: 0.4;
        }

        .contact-card h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 10px;
            margin-top: 10px;
        }
        .contact-card h1 span { color: var(--primary); }

        .contact-card p {
            color: var(--text-dim);
            font-size: 1rem;
            margin-bottom: 35px;
        }

        /* Grid for Grid Icons Layout */
        .contact-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .contact-item {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 25px 15px;
            color: var(--text-main);
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            transition: 0.4s var(--ease);
        }

        .contact-item i {
            font-size: 2.2rem;
            color: var(--text-dim);
            transition: 0.3s;
        }

        .contact-item span {
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            opacity: 0.8;
        }

        /* Hover Actions highlighting structural channels */
        .contact-item:hover {
            background: rgba(0, 142, 229, 0.15);
            border-color: var(--primary);
            transform: translateY(-5px);
            box-shadow: 0 10px 25px var(--primary-glow);
        }

        .contact-item:hover i {
            color: var(--primary);
            transform: scale(1.1);
        }

        footer { padding: 40px 0; text-align: center; border-top: 1px solid var(--border); }

        /* Mobile Breakpoints Alignment */
        @media (max-width: 900px) {
            .nav-links { display: none; }
        }

        @media (max-width: 600px) {
            .contact-grid { grid-template-columns: repeat(2, 1fr); }
            .contact-card { padding: 40px 20px; }
            .contact-card h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <nav>
            <a href="index.html" class="logo">Sovio<span>.</span></a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#experience">Experience</a></li>
                <li><a href="index.html#stack">Stack</a></li>
                <li><a href="contact.html" style="color: var(--primary);">Contact</a></li>
            </ul>
        </nav>
    </div>

    <div class="main-content">
        <div class="container">
            <div style="display: flex; justify-content: center;">
                <div class="contact-card">
                    <h1>Get In Touch<span>.</span></h1>
                    <p>Select a platform node below to initialize correspondence or inspect production histories.</p>
                    
                    <div class="contact-grid">
                        <a href="https://github.com/Sobiono-k" target="_blank" class="contact-item">
                            <i class="fab fa-github"></i>
                            <span>GitHub</span>
                        </a>

                        <a href="mailto:marielsobiono04@gmail.com" class="contact-item">
                            <i class="fas fa-envelope"></i>
                            <span>Gmail</span>
                        </a>

                        <a href="https://www.instagram.com/kielsovio_" target="_blank" class="contact-item">
                            <i class="fab fa-instagram"></i>
                            <span>Instagram</span>
                        </a>

                        <a href="https://www.linkedin.com/in/mariel-sobiono" target="_blank" class="contact-item">
                            <i class="fab fa-linkedin"></i>
                            <span>LinkedIn</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <footer>
            <p style="opacity: 0.4; font-size: 0.8rem;">&copy; 2026 Mariel Sobiono. Built for Performance.</p>
        </footer>
    </div>

</body>
</html>
